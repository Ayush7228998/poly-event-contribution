<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fund Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 350px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.6); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; color: white; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome</h2>
        <p style="color: #94a3b8;">Enter details to enter tracker</p>
        <input type="text" id="loginName" placeholder="Full Name">
        <select id="loginBranch">
            <option value="CSE">CSE</option>
            <option value="CIVIL">CIVIL</option>
            <option value="MECH">MECH</option>
            <option value="ELE">ELE</option>
        </select>
        <button onclick="login()">Enter Dashboard</button>
    </div>

    <script>
        function login() {
            const name = document.getElementById('loginName').value;
            const branch = document.getElementById('loginBranch').value;
            if(!name) return alert("Please enter your name");
            
            sessionStorage.setItem('userName', name);
            sessionStorage.setItem('userBranch', branch);
            sessionStorage.setItem('loginTime', new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
            
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
