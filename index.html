<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro College Fund Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Glassmorphism Refined */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        header { text-align: left; margin-bottom: 30px; border-left: 4px solid var(--accent); padding-left: 20px; }
        header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 20px; 
            transition: transform 0.3s ease; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); }
        .stat-box h2 { margin: 10px 0 0; font-size: 28px; color: var(--accent); }
        .stat-box span { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }

        /* Modern Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #94a3b8; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .branch-badge { 
            background: rgba(99, 102, 241, 0.2); 
            color: #c7d2fe; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 700;
        }

        /* Form Styling */
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        .row { display: flex; gap: 15px; }
        input, select { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 12px 15px; 
            border-radius: 12px; 
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.4s;
            margin-top: 10px;
        }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .delete-btn { color: #f87171; cursor: pointer; background: none; border: none; font-size: 18px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎓 Event Fund Dashboard</h1>
        <p style="color: #94a3b8;">Real-time contribution monitoring</p>
    </header>

    <div class="stat-grid">
        <div class="stat-box">
            <span>Collected</span>
            <h2 id="totalDisplay">₹0</h2>
        </div>
        <div class="stat-box">
            <span>Contributors</span>
            <h2 id="countDisplay">0</h2>
        </div>
        <div class="stat-box">
            <span>Goal Progress</span>
            <h2 id="goalPercent">0%</h2>
        </div>
    </div>

    <div class="glass-card">
        <div class="input-group">
            <input type="text" id="name" placeholder="Student Full Name">
            <div class="row">
                <select id="branch" style="flex: 1;">
                    <option value="CSE">CSE</option>
                    <option value="CIVIL">CIVIL</option>
                    <option value="MECH">MECH</option>
                    <option value="ELE">ELE</option>
                </select>
                <select id="amount" style="flex: 1;">
                    <option value="50">₹50</option>
                    <option value="100" selected>₹100</option>
                    <option value="500">₹500</option>
                </select>
            </div>
            <button class="btn-primary" onclick="addContribution()">Confirm Contribution</button>
        </div>
    </div>

    <div class="glass-card">
        <h3 style="margin-top: 0; font-size: 18px;">Recent Transactions</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Branch</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let contributions = JSON.parse(localStorage.getItem('collegeData')) || [];
    const GOAL = 10000;

    function updateUI() {
        const tableBody = document.getElementById('tableBody');
        const totalDisp = document.getElementById('totalDisplay');
        const countDisp = document.getElementById('countDisplay');
        const goalPercent = document.getElementById('goalPercent');
        
        tableBody.innerHTML = '';
        let total = 0;

        contributions.forEach((item, index) => {
            total += parseInt(item.amt);
            const row = document.createElement('tr');
            row.className = "animate__animated animate__fadeIn";
            row.innerHTML = `
                <td><div style="font-weight:600">${item.name}</div></td>
                <td><span class="branch-badge">${item.branch}</span></td>
                <td style="color: #94a3b8; font-size:12px">${item.date}</td>
                <td style="color: var(--accent); font-weight:700">₹${item.amt}</td>
                <td><button class="delete-btn" onclick="deleteEntry(${index})">&times;</button></td>
            `;
            tableBody.prepend(row);
        });

        totalDisp.innerText = `₹${total.toLocaleString()}`;
        countDisp.innerText = contributions.length;
        
        const progress = Math.min((total / GOAL) * 100, 100).toFixed(1);
        goalPercent.innerText = `${progress}%`;
    }

    function addContribution() {
        const nameInput = document.getElementById('name');
        const branch = document.getElementById('branch').value;
        const amt = document.getElementById('amount').value;
        
        if(!nameInput.value) {
            nameInput.style.borderColor = '#f87171';
            return;
        }

        const newEntry = {
            name: nameInput.value,
            branch: branch,
            amt: amt,
            date: new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
        };

        contributions.push(newEntry);
        localStorage.setItem('collegeData', JSON.stringify(contributions));
        
        nameInput.value = '';
        nameInput.style.borderColor = 'rgba(255,255,255,0.1)';
        updateUI();
    }

    function deleteEntry(index) {
        contributions.splice(index, 1);
        localStorage.setItem('collegeData', JSON.stringify(contributions));
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
