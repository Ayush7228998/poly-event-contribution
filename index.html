<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Fund Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --accent: #22d3ee; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: var(--text); margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; background: rgba(15, 23, 42, 0.9); border-right: 1px solid rgba(255,255,255,0.1); padding: 30px 15px; display: flex; flex-direction: column; gap: 20px; }
        .profile-box { background: var(--card-bg); padding: 15px; border-radius: 18px; border: 1px solid var(--accent); }
        .active-users-list { flex: 1; overflow-y: auto; }
        .user-pill { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 40px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 24px; margin-bottom: 25px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; text-align: center; }
        .stat-box h2 { margin: 5px 0; color: var(--accent); }

        .branch-badge { background: rgba(99, 102, 241, 0.2); color: #c7d2fe; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; }
        .delete-btn { color: #f87171; cursor: pointer; background: none; border: none; font-size: 18px; }

        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: auto; height: 300px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-box">
        <p style="font-size: 10px; color: #94a3b8; margin: 0;">YOU ARE LOGGED IN</p>
        <h3 id="displayUserName" style="margin: 5px 0;">Guest</h3>
        <span class="branch-badge" id="displayUserBranch">N/A</span>
    </div>

    <div class="active-users-list">
        <p style="font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 15px;">ONLINE NOW</p>
        <div id="onlineList">
            </div>
    </div>

    <button onclick="logout()" style="background:none; border:1px solid #f87171; color:#f87171; padding:10px; border-radius:10px; cursor:pointer;">Logout</button>
</div>

<div class="main-content">
    <div class="container">
        <header style="margin-bottom: 30px; border-left: 4px solid var(--accent); padding-left: 15px;">
            <h1 style="margin: 0; font-size: 26px;">🎓 Event Fund Dashboard</h1>
            <p style="color: #94a3b8; margin: 5px 0;">Global Sync Enabled</p>
        </header>

        <div class="stat-grid">
            <div class="stat-box"><span>Collected</span><h2 id="totalDisplay">₹0</h2></div>
            <div class="stat-box"><span>Goal</span><h2 id="goalPercent">0%</h2></div>
        </div>

        <div class="glass-card">
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="name" readonly style="background: rgba(15,23,42,0.4); color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 10px;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="branch" readonly style="flex:1; background: rgba(15,23,42,0.4); color: #94a3b8; border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 10px;">
                    <select id="amount" style="flex:1; background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px;">
                        <option value="50">₹50</option><option value="100" selected>₹100</option><option value="500">₹500</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="addContribution()">Confirm Contribution</button>
            </div>
        </div>

        <div class="glass-card">
            <h3 style="margin-top: 0; font-size: 16px;">Recent History</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>User</th><th>Branch</th><th>Time</th><th>Amt</th><th></th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // 1. DATA AND LOGIN CHECK
    const sessionName = sessionStorage.getItem('userName');
    const sessionBranch = sessionStorage.getItem('userBranch');
    const loginTime = sessionStorage.getItem('loginTime');

    if (!sessionName) { window.location.href = 'login.html'; }

    document.getElementById('displayUserName').innerText = sessionName;
    document.getElementById('displayUserBranch').innerText = sessionBranch;
    document.getElementById('name').value = sessionName;
    document.getElementById('branch').value = sessionBranch;

    // 2. FIREBASE INIT
    const firebaseConfig = {
        apiKey: "AIzaSyA8VcxAPzzHbc6F8iEwiEXUXY-0-2sPQ64",
        authDomain: "collegetracker-39758.firebaseapp.com",
        databaseURL: "https://collegetracker-39758-default-rtdb.firebaseio.com",
        projectId: "collegetracker-39758",
        storageBucket: "collegetracker-39758.firebasestorage.app",
        messagingSenderId: "770041440948",
        appId: "1:770041440948:web:9dfb9361315354c0b085e1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // 3. PRESENCE TRACKING (Active Users)
    const myUserRef = db.ref('onlineUsers').push();
    // Remove user from list when they close tab or disconnect
    myUserRef.onDisconnect().remove();
    myUserRef.set({ name: sessionName, branch: sessionBranch, time: loginTime });

    db.ref('onlineUsers').on('value', (snapshot) => {
        const list = document.getElementById('onlineList');
        list.innerHTML = '';
        const users = snapshot.val();
        if(users) {
            Object.values(users).forEach(u => {
                list.innerHTML += `
                    <div class="user-pill">
                        <div class="status-dot"></div>
                        <div>
                            <div style="font-weight:700">${u.name}</div>
                            <div style="font-size:10px; color:#94a3b8">Active since ${u.time}</div>
                        </div>
                    </div>`;
            });
        }
    });

    // 4. FUND TRACKING LOGIC
    const contributionsRef = db.ref('contributions');
    contributionsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const tableBody = document.getElementById('tableBody');
        let total = 0;
        tableBody.innerHTML = '';

        if(data) {
            const entries = Object.keys(data).map(k => ({id:k, ...data[k]})).reverse();
            entries.forEach(item => {
                total += parseInt(item.amt);
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${item.name}</b></td>
                        <td><span class="branch-badge">${item.branch}</span></td>
                        <td style="font-size:11px; color:#94a3b8">${item.date}</td>
                        <td style="color:var(--accent)">₹${item.amt}</td>
                        <td><button class="delete-btn" onclick="deleteEntry('${item.id}')">&times;</button></td>
                    </tr>`;
            });
        }
        document.getElementById('totalDisplay').innerText = `₹${total.toLocaleString()}`;
        document.getElementById('goalPercent').innerText = `${Math.min((total/10000)*100, 100).toFixed(1)}%`;
    });

    function addContribution() {
        contributionsRef.push({
            name: sessionName,
            branch: sessionBranch,
            amt: document.getElementById('amount').value,
            date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
    }

    function deleteEntry(id) {
        const pw = prompt("Enter Admin Password to delete:");
        if(pw === "1234") { // <--- CHANGE YOUR PASSWORD HERE
            db.ref('contributions/' + id).remove();
        } else {
            alert("Wrong password!");
        }
    }

    function logout() {
        myUserRef.remove().then(() => {
            sessionStorage.clear();
            window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>
